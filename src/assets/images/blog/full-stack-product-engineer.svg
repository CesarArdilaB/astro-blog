<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ff6a33"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4500" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#333333" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Horizontal scan lines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#333333" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="430" x2="1200" y2="430" stroke="#333333" stroke-width="0.5" opacity="0.3"/>

  <!-- Central evolution diagram -->
  <!-- Left node: Developer -->
  <g transform="translate(250, 315)">
    <!-- Code brackets icon -->
    <rect x="-70" y="-70" width="140" height="140" rx="4" fill="none" stroke="#333333" stroke-width="1.5"/>
    <text x="-30" y="-15" font-family="monospace" font-size="48" fill="#555555" font-weight="bold">&lt;/&gt;</text>
    <text x="0" y="35" font-family="monospace" font-size="11" fill="#888888" text-anchor="middle" letter-spacing="3">DEVELOPER</text>
  </g>

  <!-- Arrow / transformation line -->
  <line x1="340" y1="315" x2="520" y2="315" stroke="url(#accent)" stroke-width="2" stroke-dasharray="8 4"/>
  <polygon points="520,309 534,315 520,321" fill="#ff4500"/>

  <!-- Glitch transition zone -->
  <rect x="410" y="295" width="30" height="3" fill="#ff4500" opacity="0.6"/>
  <rect x="420" y="305" width="20" height="2" fill="#ff4500" opacity="0.4"/>
  <rect x="405" y="325" width="35" height="2" fill="#ff4500" opacity="0.3"/>

  <!-- Center: Evolution symbol -->
  <g transform="translate(600, 315)">
    <circle cx="0" cy="0" r="85" fill="none" stroke="#ff4500" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#ff4500" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#ff4500" stroke-width="0.5" opacity="0.2"/>
    <!-- Inner glow -->
    <circle cx="0" cy="0" r="12" fill="#ff4500" opacity="0.9"/>
    <circle cx="0" cy="0" r="20" fill="#ff4500" opacity="0.15"/>

    <!-- Orbiting dots representing expanded skills -->
    <circle cx="0" cy="-85" r="5" fill="#ff4500"/>
    <circle cx="73" cy="42" r="5" fill="#ff4500" opacity="0.7"/>
    <circle cx="-73" cy="42" r="5" fill="#ff4500" opacity="0.7"/>
    <circle cx="60" cy="-60" r="3" fill="#ff6a33" opacity="0.5"/>
    <circle cx="-60" cy="-60" r="3" fill="#ff6a33" opacity="0.5"/>
  </g>

  <!-- Arrow out -->
  <line x1="700" y1="315" x2="860" y2="315" stroke="url(#accent)" stroke-width="2" stroke-dasharray="8 4"/>
  <polygon points="860,309 874,315 860,321" fill="#ff4500"/>

  <!-- Right node: Product Engineer -->
  <g transform="translate(950, 315)">
    <!-- Expanded icon: diamond/prism shape -->
    <rect x="-70" y="-70" width="140" height="140" rx="4" fill="none" stroke="#ff4500" stroke-width="1.5"/>
    <polygon points="0,-30 30,0 0,30 -30,0" fill="none" stroke="#ff4500" stroke-width="2"/>
    <polygon points="0,-18 18,0 0,18 -18,0" fill="#ff4500" opacity="0.15"/>
    <text x="0" y="55" font-family="monospace" font-size="10" fill="#ff4500" text-anchor="middle" letter-spacing="3">PRODUCT ENG</text>
  </g>

  <!-- Skill labels floating around center -->
  <text x="480" y="200" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">USER_RESEARCH</text>
  <text x="640" y="185" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">PROTOTYPING</text>
  <text x="530" y="450" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">AGENT_ORCHESTRATION</text>
  <text x="680" y="440" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">SPEC_DRIVEN</text>
  <text x="460" y="435" font-family="monospace" font-size="9" fill="#444444" letter-spacing="2">TDD</text>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#ff4500"/>

  <!-- Title area -->
  <text x="60" y="80" font-family="monospace" font-size="13" fill="#ff4500" letter-spacing="4">TRANSMISSION_003</text>
  <text x="60" y="110" font-family="monospace" font-size="11" fill="#555555" letter-spacing="2">2026.04.07 /// EVOLUTION</text>

  <!-- Bottom status bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0a0a"/>
  <rect x="0" y="590" width="1200" height="1" fill="#333333"/>
  <text x="30" y="615" font-family="monospace" font-size="11" fill="#555555" letter-spacing="2">STATUS: THE_CEILING_JUST_MOVED</text>
  <text x="1170" y="615" font-family="monospace" font-size="11" fill="#333333" text-anchor="end">caesar.codes</text>
</svg>
