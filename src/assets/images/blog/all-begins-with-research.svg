<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#333333" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#ff4500"/>

  <!-- Transmission label -->
  <text x="60" y="80" font-family="monospace" font-size="13" fill="#ff4500" letter-spacing="4">TRANSMISSION_006</text>
  <text x="60" y="110" font-family="monospace" font-size="11" fill="#555555" letter-spacing="2">2026.05.05 /// DISCOVERY</text>

  <!-- Magnifying glass (research metaphor) -->
  <g transform="translate(580, 280)">
    <!-- Glass circle -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#ff4500" stroke-width="2.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#ff4500" stroke-width="0.5" opacity="0.3"/>
    <!-- Handle -->
    <line x1="70" y1="70" x2="160" y2="160" stroke="#ff4500" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <!-- Inside the glass: user/people nodes -->
    <circle cx="-30" cy="-20" r="8" fill="#ff4500" opacity="0.15"/>
    <circle cx="20" cy="-35" r="6" fill="#ff4500" opacity="0.15"/>
    <circle cx="10" cy="25" r="7" fill="#ff4500" opacity="0.15"/>
    <circle cx="-40" cy="30" r="5" fill="#ff4500" opacity="0.15"/>
    <circle cx="45" cy="10" r="6" fill="#ff4500" opacity="0.15"/>
    <!-- Connection lines between nodes -->
    <line x1="-30" y1="-20" x2="20" y2="-35" stroke="#ff4500" stroke-width="0.5" opacity="0.4"/>
    <line x1="-30" y1="-20" x2="10" y2="25" stroke="#ff4500" stroke-width="0.5" opacity="0.4"/>
    <line x1="20" y1="-35" x2="45" y2="10" stroke="#ff4500" stroke-width="0.5" opacity="0.4"/>
    <line x1="10" y1="25" x2="45" y2="10" stroke="#ff4500" stroke-width="0.5" opacity="0.4"/>
    <line x1="-40" y1="30" x2="10" y2="25" stroke="#ff4500" stroke-width="0.5" opacity="0.4"/>
    <line x1="-40" y1="30" x2="-30" y2="-20" stroke="#ff4500" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Stats on the right -->
  <text x="880" y="180" font-family="monospace" font-size="48" fill="#ff4500" opacity="0.12" font-weight="bold">80%</text>
  <text x="880" y="210" font-family="monospace" font-size="10" fill="#444444" letter-spacing="2">UNUSED</text>
  <text x="880" y="290" font-family="monospace" font-size="48" fill="#333333" opacity="0.3" font-weight="bold">42%</text>
  <text x="880" y="320" font-family="monospace" font-size="10" fill="#444444" letter-spacing="2">NO_MARKET_NEED</text>

  <!-- Left side labels -->
  <g transform="translate(60, 200)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">RESEARCH</text>
    <rect x="0" y="10" width="120" height="3" fill="#ff4500" opacity="0.8"/>
    <text x="0" y="50" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">SYNTHESIS</text>
    <rect x="0" y="60" width="80" height="3" fill="#ff4500" opacity="0.5"/>
    <text x="0" y="100" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">BUILD</text>
    <rect x="0" y="110" width="40" height="3" fill="#ff4500" opacity="0.3"/>
  </g>

  <!-- Arrow showing the inversion -->
  <text x="60" y="380" font-family="monospace" font-size="9" fill="#333333" letter-spacing="1">VALUE FLOWS UPSTREAM</text>
  <line x1="60" y1="390" x2="200" y2="390" stroke="#ff4500" stroke-width="1" opacity="0.4" stroke-dasharray="4 3"/>
  <polygon points="195,387 205,390 195,393" fill="#ff4500" opacity="0.4"/>

  <!-- Bottom status bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0a0a"/>
  <rect x="0" y="590" width="1200" height="1" fill="#333333"/>
  <text x="30" y="615" font-family="monospace" font-size="11" fill="#555555" letter-spacing="2">STATUS: INSIGHT_IS_THE_ASSET</text>
  <text x="1170" y="615" font-family="monospace" font-size="11" fill="#333333" text-anchor="end">cesar.ships</text>
</svg>
